[BARCODE_SETTINGS]
; バーコード画像の解像度。1モジュール=BARCODE_LINE_WIDTH px
BARCODE_LINE_WIDTH=3
; バーコード画像の高さ(px)
BARCODE_HEIGHT=100
; バーコード両側のクワイエットゾーン(モジュール数)
BARCODE_QUIET_MODULES=10
; バーコードに埋め込む文書コード(オペ録と眼科申し送り書)
OPERATION_RECORD_CODE=39911
SURGICAL_NURSING_RECORD_CODE=34411
; バーコード画像を挿入するシート名(カンマ区切り)。空欄なら共通情報以外の全シートに挿入する
OPERATION_RECORD_SHEETS=白,白硝1,硝1,白緑,緑,涙道,ICL,エキシマ,復位,他
SURGICAL_NURSING_RECORD_SHEETS=日帰り,1泊,眼瞼1泊,涙道1泊,局麻前泊,PTK,PDT,PDT指示

[DOCUMENT_SETTINGS]
; 共通情報シート書き込み・別名保存の対象テンプレートファイル名(バーコードは付与しない)
CONTACT_ORDER_SEED_FILE=コンタクトレンズ注文書(シード).xlsx
CONTACT_ORDER_PANACOM_FILE=コンタクトレンズ注文書(パナコム).xlsx
GLASS_PRESCRIPTION_FILE=眼鏡処方.xlsx
; 眼科申し送り書・オペ録テンプレートファイル名
NS_FILE=眼科申し送り書.xlsm
RECORD_FILE=オペ録.xlsm

[WINDOW_SETTINGS]
; ウィンドウの初期位置（画面左上からのピクセル数）
WINDOW_X=0
WINDOW_Y=0
